<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bluebird Academy</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,'DM Sans',sans-serif;background:#F5F3F0;color:#1A1916;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
  .card{background:white;border-radius:16px;padding:40px;max-width:420px;width:100%;text-align:center;box-shadow:0 2px 24px rgba(0,0,0,.06);}
  .logo{width:48px;height:48px;background:#2F7BE5;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 16px;}
  h1{font-size:20px;font-weight:700;margin-bottom:8px;}
  p{font-size:14px;color:#6B6860;line-height:1.6;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🐦</div>
  <h1>Bluebird Academy</h1>
  <p>Module links are shared directly with students through the course dashboard. If you landed here by accident, check your course link.</p>
</div>
</body>
</html>
